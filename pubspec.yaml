name: focusdo
description: A topic-based todo app with scheduled alarms and Firebase persistence.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

  # State Management
  provider: ^6.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
